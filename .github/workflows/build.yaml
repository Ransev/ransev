name: README build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Get Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Update profile stats
        env:
          ACCESS_TOKEN: ${{ secrets.PROFILE_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: python today.py
      - name: Commit changes
        run: |-
          git config user.email "Ransev@users.noreply.github.com"
          git config user.name "Ransev"
          git add dark_mode.svg
          git diff --cached --quiet || git commit -m "chore: update profile stats"
          git push
